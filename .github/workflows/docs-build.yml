name: "📖 Documentation"

on:
    push:
        branches: [master]
    pull_request:
        branches: [master, dev]

permissions:
    contents: read
    pages: write
    id-token: write

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        env:
            MNE_DATA: ${{ github.workspace }}/mne_data
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Install uv
              uses: astral-sh/setup-uv@v5
              with:
                  enable-cache: true
                  python-version: "3.13"

            - name: Cache MNE Data
              id: cache-mne
              uses: actions/cache@v4
              with:
                  path: ${{ env.MNE_DATA }}
                  key: mne-datasets-v1

            - name: Install dependencies
              run: uv sync --group docs --extra full

            - name: Download MNE Data (if required)
              if: steps.cache-mne.outputs.cache-hit != 'true'
              run: |
                  mkdir -p ${{ env.MNE_DATA }}
                  uv run python -c "
                  import mne;
                  mne.datasets.sample.data_path(verbose=True);
                  mne.datasets.fetch_fsaverage(verbose=True);
                  mne.datasets.testing.data_path(verbose=True);
                  "

            - name: Build documentation
              run: uv run sphinx-build --keep-going -j 2 -b html docs/ docs/_build/html

            - name: Upload Artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: docs/_build/html

            - name: Deploy to GitHub Pages
              # Only deploy on actual push to master
              if: github.event_name == 'push' && github.ref == 'refs/heads/master'
              id: deployment
              uses: actions/deploy-pages@v4

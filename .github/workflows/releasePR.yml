name: 📦 Release & Publish

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  # --- STAGE 1: Update Visuals ---
  readme:
    name: 📊 Update README Figures
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv pip install "popularipy @ git+https://github.com/DominiqueMakowski/popularipy"
          uv sync --extra full --group dev

      - name: Run README_examples
        run: uv run python docs/readme/README_examples.py

      - name: Commit figures
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update README figures [skip ci]"
          file_pattern: "*.png"

  # --- STAGE 2: Test Release ---
  publish-test:
    name: 🧪 Publish to TestPyPI
    needs: readme
    if: always() && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: Build
        run: uv build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true

  # --- STAGE 3: Production Release ---
  publish-prod:
    name: 🚀 Publish to PyPI
    needs: publish-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/neurokit2
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: Build
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true

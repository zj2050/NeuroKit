name: ✨ Style

on:
  pull_request:
    branches: [master, dev]
  push:
    branches: [master, dev]

jobs:
  style:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.10"

      - name: Check Style
        # Fail if the code is not formatted correctly
        run: |
          uvx ruff check .
          uvx ruff format --check .

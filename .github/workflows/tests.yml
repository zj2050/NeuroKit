name: 🏭 Tests

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    env:
      MNE_DATA: ${{ github.workspace }}/mne_data
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Install CVXOPT build dependencies for newer Python versions
        if: matrix.python-version == '3.14'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            python3-dev \
            libopenblas-dev \
            liblapack-dev \
            libsuitesparse-dev \
            libglpk-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Cache MNE Data
        id: cache-mne
        uses: actions/cache@v4
        with:
          path: ${{ env.MNE_DATA }}
          key: mne-datasets-v1

      - name: Install dependencies
        run: |
          uv sync --extra full --group dev

      - name: Download MNE Data (if required)
        if: steps.cache-mne.outputs.cache-hit != 'true'
        run: |
          mkdir -p ${{ env.MNE_DATA }}
          uv run python -c "
          import mne;
          mne.datasets.sample.data_path(verbose=True);
          mne.datasets.fetch_fsaverage(verbose=True);
          mne.datasets.testing.data_path(verbose=True);
          "

      - name: Run Tests
        run: |
          uv run pytest --cov=neurokit2 --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          fail_ci_if_error: false
